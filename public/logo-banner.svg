<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Horizontal logo lockup — icon mark on left, wordmark on right.
    Dark background (#0d0d14). For transparent bg, remove the <rect>.
  -->
  <defs>
    <linearGradient id="rule-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6e40c9"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="sep-grad" x1="258" y1="35" x2="258" y2="265" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6e40c9"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="#0d0d14"/>

  <!-- ── Icon mark ── -->
  <!-- "cs" -->
  <text x="135" y="130"
    text-anchor="middle"
    fill="#e2e8f0"
    font-family="ui-monospace,monospace"
    font-size="72"
    font-weight="700"
    letter-spacing="10">cs</text>
  <!-- gradient rule -->
  <line x1="85" y1="162" x2="185" y2="162" stroke="url(#rule-grad)" stroke-width="2"/>
  <!-- ".ai" -->
  <text x="135" y="222"
    text-anchor="middle"
    font-family="ui-monospace,monospace"
    font-size="64"
    font-weight="700"
    letter-spacing="5"><tspan fill="#00d4ff">.</tspan><tspan fill="#00d4ff">ai</tspan></text>

  <!-- ── Separator ── -->
  <line x1="258" y1="35" x2="258" y2="265" stroke="url(#sep-grad)" stroke-width="2"/>

  <!-- ── Wordmark: cybersynaptics.ai ── -->
  <text x="286" y="150"
    dominant-baseline="middle"
    font-family="ui-monospace,monospace"
    font-size="80"
    font-weight="700"><tspan fill="#e2e8f0">cybersynaptics</tspan><tspan fill="#00d4ff">.</tspan><tspan fill="#00d4ff">ai</tspan></text>
</svg>
