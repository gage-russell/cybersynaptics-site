<svg width="32" height="32" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Logo mark — single source of truth.
    LogoMark.astro inlines this file; edit here to update favicon + header logo simultaneously.
  -->
  <defs>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6e40c9"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>
  <!-- badge background -->
  <rect width="36" height="36" rx="7" fill="#0d0d14"/>
  <!-- "cs" — near-white, wide tracking -->
  <text x="18" y="16"
    text-anchor="middle"
    fill="#e2e8f0"
    font-family="ui-monospace,monospace"
    font-size="13"
    font-weight="700"
    letter-spacing="2">cs</text>
  <!-- gradient rule -->
  <line x1="9" y1="20.5" x2="27" y2="20.5" stroke="url(#lg)" stroke-width="0.75"/>
  <!-- ".ai" — dot in white, "ai" in cyan -->
  <text x="18" y="29.5"
    text-anchor="middle"
    font-family="ui-monospace,monospace"
    font-size="12"
    font-weight="700"
    letter-spacing="1"><tspan fill="#00d4ff">.</tspan><tspan fill="#00d4ff">ai</tspan></text>
</svg>
